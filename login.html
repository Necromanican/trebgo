<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andito ka because?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-left: 25px;
            padding-right: 25px;
 
        }
        .and2{
            font-size: 20pt;
            margin:0;
        }

        .login-box {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,.2);
            width: 100%;
            max-width: 600px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #error {
            color: red;
            margin-top: 10px;
        }



.bcause{
    width: 100%;
     /*animation: line 3s ease-in-out infinite*/
     animation: login_one 2800ms infinite linear;
     pointer-events: none;
     user-select: none;
}
@keyframes login_one {
  0% {
    -webkit-transform: scale(1);
    transform: scale(1);
    border-radius: 0;
  }
  40% {
    -webkit-transform: scale(0.9);
    transform: scale(0.9);
    border-radius: 15px;
  }
  100% {
    -webkit-transform: scale(1);
    transform: scale(1);
    border-radius: 0;
  }
}
@keyframes line {
    from {
        transform: translateY(4px)
    }

    50% {
        transform: translateY(-4px)
    }

    to {
        transform: translateY(4px)
    }
}




    </style>
</head>
<body>

<form class="login-box" onsubmit="login(); return false;">
    <h2 class="and2">andito ka</h2>

    <center>
        <img src="hq720.jpg" class="bcause">
    </center>

    <input type="text" id="username" placeholder="Username" enterkeyhint="next">
    <input type="password" id="password" placeholder="Password" enterkeyhint="go">

    <button type="submit">Login</button>

    <p id="error"></p>
</form>

<script src="login.js"></script>

</body>
</html>
